<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin conexión — Vasak Community</title>
  <style>
    :root {
      --primary: #dd7878;
      --bg: #eff1f5;
      --surface: #ffffff;
      --text: #4c4f69;
      --muted: #6c6f85;
      --border: #dce0e8;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e2e;
        --surface: #313244;
        --text: #cdd6f4;
        --muted: #a6adc8;
        --border: rgba(255,255,255,0.08);
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
    }
    .icon {
      font-size: 48px;
      margin-bottom: 24px;
      display: block;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }
    p {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 150ms ease;
    }
    .btn:hover { opacity: 0.88; }
    .status {
      margin-top: 24px;
      font-size: 13px;
      color: var(--muted);
    }
    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      margin-right: 6px;
      vertical-align: middle;
    }
    .dot.online { background: #40a02b; }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">📡</span>
    <h1>Sin conexión a internet</h1>
    <p>
      No podemos cargar esta página ahora mismo.<br>
      Revisá tu conexión e intentá de nuevo.
    </p>
    <button class="btn" onclick="window.location.reload()">
      ↺ Reintentar
    </button>
    <p class="status">
      <span class="dot" id="status-dot"></span>
      <span id="status-text">Sin conexión</span>
    </p>
  </div>

  <script>
    function updateStatus() {
      var dot  = document.getElementById("status-dot");
      var text = document.getElementById("status-text");
      if (navigator.onLine) {
        dot.className  = "dot online";
        text.textContent = "Conexión restaurada — recargando...";
        setTimeout(function () { window.location.reload(); }, 1500);
      } else {
        dot.className  = "dot";
        text.textContent = "Sin conexión";
      }
    }
    window.addEventListener("online",  updateStatus);
    window.addEventListener("offline", updateStatus);
    updateStatus();
  </script>
</body>
</html>
